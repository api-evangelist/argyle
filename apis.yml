aid: argyle
name: Argyle
description: Argyle is an employment data connectivity platform offering a REST API
  for accessing payroll records, employment history, income verification, and gig
  platform earnings via user-consented direct-source connections. The API provides
  real-time access to standardized payroll data across traditional employers, gig
  platforms, and government payroll systems, with webhook alerts for employment and
  income changes.
