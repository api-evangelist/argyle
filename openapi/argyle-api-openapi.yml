        pay_cycle:
          type: string
          enum:
          - daily
          - weekly
          - biweekly
          - semimonthly
          - monthly
          - quarterly
          description: 'Payment frequency.

            - `daily`

            - `weekly`

            - `biweekly` — every two weeks

            - `semimonthly` — twice a month

            - `monthly`

            - `quarterly`

            '
          example: semimonthly
