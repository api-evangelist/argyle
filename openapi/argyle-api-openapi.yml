        updated_at:
          type: string
          format: date-time
          description: 'Timestamp ([ISO 8601](https://en.wikipedia.org/wiki/ISO_8601))
            when a property value of the identity object most recently changed.

            '
          example: '2023-01-30T12:55:06.478699Z'
