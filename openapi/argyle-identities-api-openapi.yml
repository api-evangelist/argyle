openapi: 3.0.0
info:
  title: Argyle Accounts Identities API
  version: '2.0'
  description: RESTful API providing user-consented access to payroll and employment data including identities, paystubs, gigs, shifts, vehicles, ratings, payroll documents, and deposit destinations across thousands of employers and gig platforms.
  contact:
    name: Argyle Support
    url: https://docs.argyle.com/
  x-api-id: argyle
  x-audience: public
servers:
- url: https://api.argyle.com
  description: Production
- url: https://api-sandbox.argyle.com
  description: Sandbox
security:
- basicAuth: []
tags:
- name: Identities
paths:
  /v2/identities/{id}:
    get:
      summary: Retrieve an identity
      description: Retrieves an identity object.
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
        description: ID of the identity object to be retrieved.
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Identity'
              example:
                id: 0153b145-7ab9-bea2-cc16-a8b71328942f
                account: 0187c66e-e7e5-811c-b006-2232f00f426a
                address:
                  city: New York
                  line1: 852 North W St
                  line2: Apt 221
                  state: NY
                  country: US
                  postal_code: '10014'
                first_name: Sarah
                last_name: Longfield
                full_name: Sarah Longfield
                birth_date: '1980-10-30'
                email: '[email protected]'
                phone_number: '+12125555555'
                picture_url: www.argyle.com/logofoldername
                employment_status: active
                employment_type: full-time
                job_title: Store Manager
                ssn: 522-09-1191
                marital_status: Married filing jointly
                gender: Female
                original_hire_date: '2019-01-03'
                hire_date: '2020-04-08'
                termination_date: null
                termination_reason: null
                employer: Whole Goods
                employment: 0183d52a-d3b2-331d-c753-3662a20e352b
                base_pay:
                  amount: '58024.50'
                  period: annual
                  currency: USD
                pay_cycle: semimonthly
                platform_ids:
                  employee_id: OB238HDW5
                  position_id: 6ELL4O7PM
                  platform_user_id: JLH7B9V6O6YGN9O7
                created_at: '2023-01-30T12:53:24.561594Z'
                updated_at: '2023-01-30T12:55:06.478699Z'
                metadata: {}
      tags:
      - Identities
  /v2/identities:
    get:
      summary: List all identities
      description: Returns a paginated list of all identity objects.
      parameters:
      - in: query
        name: account
        schema:
          type: string
          format: uuid
        description: Filter by account ID.
      - in: query
        name: user
        schema:
          type: string
          format: uuid
        description: Filter by user ID.
      - in: query
        name: employment
        schema:
          type: string
          format: uuid
        description: Filter by employment ID.
      - in: query
        name: limit
        schema:
          type: integer
        description: 'Number of identity objects returned per page. Default: 10. Maximum: 200.

          '
      - in: query
        name: cursor
        schema:
          type: string
        description: The URL returned in `next` or `previous` used to retrieve another [page](/api-guide/overview#pagination) of results.
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: object
                properties:
                  next:
                    type: string
                    format: uri
                    nullable: true
                    description: URL for the next page of results, if available.
                  previous:
                    type: string
                    format: uri
                    nullable: true
                    description: URL for the previous page of results, if available.
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/Identity'
              example:
                next: https://api-sandbox.argyle.com/v2/identities?cursor=ZXhhbXBsZV9jdXJzb3I
                previous: null
                results:
                - id: 0186da0b-6569-0ea0-eb50-b64e97cb29e9
